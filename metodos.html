<html lang="es">
    <head>
        <title>Metodos de numeros</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <main class="contenedor">
            <form class="tarjeta" action="#">
                <h1>Metodos de numeros</h1>

                <label for="numero">Numero</label>
                <input type="number" id="numero" name="numero" placeholder="Escribe un numero">

                <button class="boton-principal" type="button" id="btnCalcular">Calcular</button>

                <p class="resultado" id="resultado">El resultado aparecera aqui</p>
            </form>
        </main>

        <script>
            const numero = document.querySelector("#numero")
            const buttonCalcular = document.querySelector("#btnCalcular")
            const resultado = document.querySelector("#resultado")

            buttonCalcular.addEventListener("click", () => {
                const valor = parseInt(numero.value, 10)

                if (Number.isNaN(valor)) {
                    resultado.textContent = "Escribe un numero"
                    return
                }

                const tipoParidad = valor % 2 === 0 ? "par" : "impar"
                const tipoPrimo = esPrimo(valor) ? "primo" : "no es primo"

                resultado.textContent = "El numero " + valor + " es " + tipoParidad + " y " + tipoPrimo
                numero.value = ""
            })

            function esPrimo(valor) {
                if (valor < 2) {
                    return false
                }

                for (let i = 2; i <= Math.sqrt(valor); i++) {
                    if (valor % i === 0) {
                        return false
                    }
                }

                return true
            }
        </script>
    </body>
</html>
