<html lang="es">
    <body>
        <form action="#">
            <input type="number" id="numero" name="numero">
            <button type="button" id="btnCalcular">Calcular</button>
            <p id="resultado"></p>
        </form>

        <script>
            const numero = document.querySelector("#numero")
            const buttonCalcular = document.querySelector("#btnCalcular")
            const resultado = document.querySelector("#resultado")

            buttonCalcular.addEventListener("click", () => {
                const valor = parseInt(numero.value, 10)

                if (Number.isNaN(valor)) {
                    resultado.textContent = "Escribe un numero"
                    return
                }

                const tipoParidad = valor % 2 === 0 ? "par" : "impar"
                const tipoPrimo = esPrimo(valor) ? "primo" : "no es primo"

                resultado.textContent = "El numero " + valor + " es " + tipoParidad + " y " + tipoPrimo
                numero.value = ""
            })

            function esPrimo(valor) {
                if (valor < 2) {
                    return false
                }

                for (let i = 2; i <= Math.sqrt(valor); i++) {
                    if (valor % i === 0) {
                        return false
                    }
                }

                return true
            }
        </script>
    </body>
</html>
